<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numbers10 Remote Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      -webkit-app-region: drag;
    }
    .toolbar {
      background: rgba(26, 26, 46, 0.95);
      color: white;
      border-radius: 0 0 12px 12px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.3);
      border-top: none;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF5252;
      animation: pulse 1s infinite;
    }
    .label {
      color: #FF5252;
    }
    .btn {
      -webkit-app-region: no-drag;
      background: #FF5252;
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #e04848; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="dot"></span>
    <span>Remote control active</span>
    <button class="btn" onclick="window.agent.controlRevoke()">Stop Control</button>
  </div>
</body>
</html>
