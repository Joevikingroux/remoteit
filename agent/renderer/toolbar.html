<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RemoteIT Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      -webkit-app-region: drag;
    }
    .toolbar {
      background: rgba(220, 38, 38, 0.95);
      color: white;
      border-radius: 0 0 12px 12px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      animation: pulse 1s infinite;
    }
    .btn {
      -webkit-app-region: no-drag;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.3); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="dot"></span>
    <span>Remote control active</span>
    <button class="btn" onclick="window.agent.controlRevoke()">Stop Control</button>
  </div>
  <script>
    // preload.js gives us window.agent
  </script>
</body>
</html>
