<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numbers10 Remote Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .toolbar {
      background: #1A1A2E;
      color: white;
      height: 100%;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 2px solid rgba(0, 191, 255, 0.4);
      cursor: move;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF5252;
      animation: pulse 1s infinite;
      flex-shrink: 0;
    }
    .btn {
      background: #FF5252;
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn:hover { background: #e04848; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="toolbar" data-tauri-drag-region>
    <span class="dot"></span>
    <span>Remote control active</span>
    <button class="btn" id="stop-btn">Stop Control</button>
  </div>
  <script>
    document.getElementById('stop-btn').addEventListener('click', () => {
      window.__TAURI__.core.invoke('control_revoke').catch(() => {});
      // Notify main window
      window.__TAURI__.event.emit('toolbar-revoke-control', {}).catch(() => {});
    });
  </script>
</body>
</html>
